# Site settings
title: GrowthMax Inc
description: Custom AI agents and training for organizations ready to scale with agentic AI.
url: https://growthmaxinc.com
email: hi@growthmaxinc.com
logo: /growthMAX.PNG

# Build
permalink: /blog/:slug/
markdown: kramdown

# Plugins (all whitelisted on GitHub Pages)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# SEO tag defaults
author: GrowthMax Inc
# NOTE: no `twitter:` block. GrowthMax has no X/Twitter account (only LinkedIn).
# Without a `twitter.username`, jekyll-seo-tag emits `<meta name="twitter:site"
# content="@">` which is invalid. Better to emit no Twitter tags at all than
# emit broken ones. Add `twitter: { username: <handle> }` here if/when an
# account exists.
social:
  name: GrowthMax Inc
  links:
    - https://www.linkedin.com/company/growthmaxinc/

# Feed settings
feed:
  path: /feed.xml

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: GrowthMax Inc
      # Per-post hero images override this via the `image:` front-matter
      # written by scripts/generate-post.py.
      image: /growthMAX.PNG
  - scope:
      path: ""
    values:
      layout: null
      # Site-wide og:image default. jekyll-seo-tag reads page.image (not
      # site.image), so the `defaults` block is the right place for this.
      # Any page that wants its own social-share image just sets `image:`
      # in its front-matter and overrides this.
      image: /growthMAX.PNG

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
  - daily-improvement-*.md
  - elevenlabs-training-material.md
  - download_files.sh
  - README.md
  - .github
  - node_modules
  - vendor
  - blog-people-first
  - mockup-design-elements.html
  - PUSH_THIS.sh
  - SEO-STANDARDS.md
  - GrowthMax-Keyword-Program-Strategy.md
  - scripts
