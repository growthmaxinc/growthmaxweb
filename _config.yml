# Site settings
title: GrowthMax Inc
description: Custom AI agents and training for organizations ready to scale with agentic AI.
url: https://growthmaxinc.com
email: hi@growthmaxinc.com
logo: /growthMAX.PNG
# Site-wide default for og:image / link previews. Any page without its own
# `image:` in front-matter (homepage, blog index, FAQ, etc.) falls back to
# this on LinkedIn, Slack, iMessage, WhatsApp, and other Open Graph consumers.
# Blog posts override this with their per-post hero illustration.
image: /growthMAX.PNG

# Build
permalink: /blog/:slug/
markdown: kramdown

# Plugins (all whitelisted on GitHub Pages)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# SEO tag defaults
author: GrowthMax Inc
# NOTE: no `twitter:` block. GrowthMax has no X/Twitter account (only LinkedIn).
# Without a `twitter.username`, jekyll-seo-tag emits `<meta name="twitter:site"
# content="@">` which is invalid. Better to emit no Twitter tags at all than
# emit broken ones. Add `twitter: { username: <handle> }` here if/when an
# account exists.
social:
  name: GrowthMax Inc
  links:
    - https://www.linkedin.com/company/growthmaxinc/

# Feed settings
feed:
  path: /feed.xml

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: GrowthMax Inc
  - scope:
      path: ""
    values:
      layout: null

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
  - daily-improvement-*.md
  - elevenlabs-training-material.md
  - download_files.sh
  - README.md
  - .github
  - node_modules
  - vendor
  - blog-people-first
  - mockup-design-elements.html
  - PUSH_THIS.sh
  - SEO-STANDARDS.md
  - GrowthMax-Keyword-Program-Strategy.md
  - scripts
