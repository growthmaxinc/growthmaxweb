name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  # Also fire when the auto-pipeline or backfill workflows complete on main.
  # Those workflows commit via GITHUB_TOKEN, which by design does NOT
  # auto-trigger other workflows (anti-loop safeguard) — so without this
  # entry, a new auto-generated post lands on main but never deploys.
  workflow_run:
    workflows: ["Generate Blog Post", "Backfill All Hero Images"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Only deploy when the triggering workflow_run actually succeeded
    # (skip if the upstream workflow failed). For push and workflow_dispatch
    # events, this is always true.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
