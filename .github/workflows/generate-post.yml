name: Generate Blog Post

on:
  schedule:
    # Runs Monday, Wednesday, Friday at 9am UTC
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific topic for the blog post (optional)'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      has_new_post: ${{ steps.commit.outputs.has_new_post }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-genai pyyaml Pillow openpyxl

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.WEBSITE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMAGE_MODEL_TIER: paid
          TOPIC_INPUT: ${{ github.event.inputs.topic }}
        run: python scripts/generate-post.py

      - name: Audit generated post (defense in depth)
        # generate-post.py self-validates before saving, but we run the full
        # audit here as a belt-and-suspenders check before commit.
        run: python scripts/seo_aeo_audit.py

      - name: Validate hero image is on-brand
        # The canonical PIL renderer always emits 1200x630. This guards
        # against any future fallback path that might produce off-brand
        # dimensions before the image reaches main. See
        # scripts/skills/growthmax-imagery/SKILL.md.
        run: python scripts/validate_hero_images.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Include the new post markdown, its generated hero image, AND the
          # keyword program workbook (which the script writes back to so Calendar
          # status and Master Keywords stay in sync with what's actually live).
          # The 'blog-*.jpg' pattern matches the naming convention used by
          # scripts/generate-post.py's generate_hero_image() helper.
          git add _posts/ 'blog-*.jpg' GrowthMax-Keyword-Program.xlsx
          if git diff --staged --quiet; then
            echo "No new posts to commit"
            echo "has_new_post=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto-generate blog post $(date +%Y-%m-%d)"
            git push
            echo "has_new_post=true" >> $GITHUB_OUTPUT
          fi

      - name: Notify on stale pipeline
        # Scheduled run produced no commit (either a silent script failure,
        # the slug-collision guard firing, or no eligible Calendar row).
        # Open a tracking issue so this doesn't go undetected — same
        # signal a human would otherwise notice by spotting that no
        # auto-generate commit landed on a Mon/Wed/Fri.
        if: github.event_name == 'schedule' && steps.commit.outputs.has_new_post != 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const title = "Auto-pipeline produced no post";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Scheduled run \`${context.runId}\` finished without producing a new post.`,
              ``,
              `Likely causes — diagnose in order:`,
              `1. **AEO retry exhaustion** — open the run, look at the "Generate blog post" step for "Generation failed AEO validation after 3 attempts. Last errors: ..."`,
              `2. **JSON parse retry exhaustion** — same step, look for "JSON parse failed on attempt 3"`,
              `3. **Slug-collision guard fired cleanly** — look for "ABORT (early guard)" or "ABORT (late guard)"; means the Calendar row's slug already exists in \`_posts/\`. Dedupe the Calendar tab.`,
              `4. **No eligible Calendar rows** — look for "No 'Not started' rows in Calendar"; means the keyword program is exhausted.`,
              `5. **Secret expired** — look for an Anthropic or Gemini API auth error.`,
              ``,
              `Run: ${runUrl}`
            ].join("\n");

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "auto-pipeline-stale",
            });

            if (existing.length === 0) {
              // Ensure the label exists before we try to apply it.
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: "auto-pipeline-stale",
                  color: "d73a4a",
                  description: "Scheduled blog auto-pipeline run produced no commit",
                });
              } catch (e) {
                if (e.status !== 422) throw e; // 422 = already exists
              }
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["auto-pipeline-stale"],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
            }

  build:
    runs-on: ubuntu-latest
    needs: generate
    if: needs.generate.outputs.has_new_post == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
