name: Generate Blog Post

on:
  schedule:
    # Runs Monday, Wednesday, Friday at 9am UTC
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific topic for the blog post (optional)'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      has_new_post: ${{ steps.commit.outputs.has_new_post }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic pyyaml Pillow

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.WEBSITE }}
          TOPIC_INPUT: ${{ github.event.inputs.topic }}
        run: python scripts/generate-post.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Include both the new post markdown and its generated hero image.
          # The 'blog-*.jpg' pattern matches the naming convention used by
          # scripts/generate-post.py's generate_hero_image() helper.
          git add _posts/ 'blog-*.jpg'
          if git diff --staged --quiet; then
            echo "No new posts to commit"
            echo "has_new_post=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto-generate blog post $(date +%Y-%m-%d)"
            git push
            echo "has_new_post=true" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: generate
    if: needs.generate.outputs.has_new_post == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
