name: Generate Blog Post

on:
  schedule:
    # Runs Monday, Wednesday, Friday at 9am UTC
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific topic for the blog post (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC_INPUT: ${{ github.event.inputs.topic }}
        run: python scripts/generate-post.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --staged --quiet; then
            echo "No new posts to commit"
          else
            git commit -m "Auto-generate blog post $(date +%Y-%m-%d)"
            git push
          fi
