# DEPRECATED — kept for backward compatibility only.
#
# The blog auto-generation pipeline (scripts/generate-post.py) now reads
# the next "Not started" row from the Calendar (90-day) tab of
# GrowthMax-Keyword-Program.xlsx. To change what the next post will be:
#
#   1. Open GrowthMax-Keyword-Program.xlsx
#   2. Go to the "Calendar (90-day)" tab
#   3. Edit / add / reorder rows. The script picks the earliest unpublished
#      row by publish date, with overdue rows prioritized over upcoming ones.
#
# To trigger a one-off post on a specific keyword from the workflow_dispatch
# UI, pass the keyword as the `topic` input — the script will look it up in
# the Calendar tab; if not present, it generates a free-form post against it
# (defaults to Pillar 3 / Adoption).

