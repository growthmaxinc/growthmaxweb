<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init({ duration: 700, easing: 'ease-out-cubic', once: true, offset: 80 });</script>
<script>
	function closeMobileMenu() {
		document.getElementById('mobile-menu').classList.add('hidden');
	}
	document.addEventListener('click', function(e) {
		var dropdowns = [
			{ wrapper: 'solutions-dropdown', menu: 'solutions-menu' },
			{ wrapper: 'resources-dropdown', menu: 'resources-menu' }
		];
		dropdowns.forEach(function(d) {
			var wrapper = document.getElementById(d.wrapper);
			var menu = document.getElementById(d.menu);
			if (wrapper && menu && !wrapper.contains(e.target)) {
				menu.classList.add('hidden');
			}
		});
	});
	['solutions-menu', 'resources-menu'].forEach(function(menuId) {
		document.querySelectorAll('#' + menuId + ' a').forEach(function(link) {
			link.addEventListener('click', function() {
				document.getElementById(menuId).classList.add('hidden');
			});
		});
	});
</script>
